name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `dcf play H 1`
        2. ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: CLI output
      description: Paste the full output (run with `-v` for verbose)
      render: shell
  - type: input
    id: version
    attributes:
      label: CLI version
      placeholder: "dcf --version"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 24.04, etc."
