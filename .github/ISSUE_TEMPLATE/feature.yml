name: Feature Request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: what
    attributes:
      label: What do you want?
      placeholder: Describe the feature
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why?
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds or other approaches?
